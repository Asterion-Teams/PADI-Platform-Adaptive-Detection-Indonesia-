<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map CCTV — Publik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eef2f7;
            --panel: rgba(255, 255, 255, 0.88);
            --panel-solid: #ffffff;
            --border: rgba(15, 23, 42, 0.08);
            --border-strong: rgba(15, 23, 42, 0.14);
            --text: #334155;
            --muted: #94a3b8;
            --cyan: #0ea5e9;
            --purple: #9333ea;
            --green: #10b981;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
        #livemap { position: absolute; inset: 0; z-index: 0; background: #dbe4ef; }

        /* ── Top bar ─────────────────────────────────────────── */
        .lm-topbar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 600;
            display: flex; align-items: center; gap: 0.9rem; flex-wrap: wrap;
            padding: 0.7rem 1.1rem;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.94) 0%, rgba(255, 255, 255, 0.78) 100%);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 18px rgba(15, 23, 42, 0.06);
        }
        .lm-brand { display: flex; align-items: center; gap: 0.7rem; }
        .lm-brand .ic {
            width: 40px; height: 40px; border-radius: 0.75rem;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: #fff; font-size: 1.05rem;
            box-shadow: 0 6px 18px rgba(14, 165, 233, 0.3);
        }
        .lm-brand .kick { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); line-height: 1; display: flex; align-items: center; gap: 5px; }
        .lm-brand .kick .live { width: 6px; height: 6px; border-radius: 9999px; background: #ef4444; box-shadow: 0 0 0 0 rgba(239,68,68,0.7); animation: lm-ping 1.6s ease-out infinite; }
        .lm-brand .ttl { font-size: 1.08rem; font-weight: 800; color: #0f172a; line-height: 1.15; letter-spacing: -0.01em; }

        .lm-stats { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-left: auto; }
        .lm-stat {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.42rem 0.8rem; border-radius: 0.8rem;
            background: var(--panel); border: 1px solid var(--border);
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .lm-stat:hover { border-color: var(--border-strong); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(15,23,42,0.06); }
        .lm-stat .si { width: 26px; height: 26px; border-radius: 0.55rem; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; flex-shrink: 0; }
        .lm-stat .v { font-size: 1rem; font-weight: 800; color: #0f172a; line-height: 1; font-variant-numeric: tabular-nums; }
        .lm-stat .l { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 700; margin-top: 3px; }

        .lm-btn {
            display: inline-flex; align-items: center; gap: 0.45rem;
            padding: 0.55rem 0.9rem; border-radius: 0.7rem;
            border: 1px solid rgba(14,165,233,0.3);
            background: linear-gradient(180deg, rgba(14,165,233,0.1), rgba(14,165,233,0.04));
            color: #0369a1; font-size: 0.72rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s;
        }
        .lm-btn:hover { background: rgba(14,165,233,0.16); border-color: rgba(14,165,233,0.45); }
        .lm-btn:active { transform: scale(0.97); }

        /* ── Legend ─────────────────────────────────────────── */
        .lm-legend {
            position: absolute; bottom: 18px; left: 18px; z-index: 500;
            background: var(--panel); backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border); border-radius: 0.9rem;
            padding: 0.75rem 0.9rem; font-size: 0.72rem; color: var(--text);
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.1);
        }
        .lm-legend .hd { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 800; margin-bottom: 8px; }
        .lm-legend .row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 6px; }
        .lm-legend .row:last-child { margin-bottom: 0; }
        .lm-legend .sw { width: 11px; height: 11px; border-radius: 9999px; box-shadow: 0 0 8px currentColor; }

        /* ── Status pill ─────────────────────────────────────── */
        .lm-status {
            position: absolute; top: 76px; right: 18px; z-index: 500;
            display: inline-flex; align-items: center; gap: 0.45rem;
            padding: 0.4rem 0.8rem; border-radius: 0.7rem; font-size: 0.68rem; font-weight: 700;
            background: rgba(16, 185, 129, 0.14); color: #059669; border: 1px solid rgba(16, 185, 129, 0.3);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(15,23,42,0.08);
        }
        .lm-status.err { background: rgba(239, 68, 68, 0.14); color: #dc2626; border-color: rgba(239, 68, 68, 0.3); }

        /* ── Leaflet light overrides ─────────────────────────── */
        .leaflet-popup-content-wrapper { background: var(--panel-solid) !important; color: var(--text) !important; border-radius: 14px !important; border: 1px solid var(--border) !important; box-shadow: 0 18px 50px rgba(15,23,42,0.18) !important; }
        .leaflet-popup-tip { background: var(--panel-solid) !important; }
        .leaflet-popup-content { margin: 13px 15px !important; }
        .cam-popup .title { font-weight: 800; font-size: 13.5px; color: #0f172a; margin-bottom: 2px; letter-spacing: -0.01em; }
        .cam-popup .preview { border-radius: 10px; overflow: hidden; margin-top: 9px; background: #0b1220; border: 1px solid var(--border); }
        .cam-popup .preview img { width: 100%; height: 122px; object-fit: cover; display: block; }
        .leaflet-control-zoom a { background: #fff !important; color: #334155 !important; border-color: var(--border) !important; }
        .leaflet-control-zoom a:hover { background: #f1f5f9 !important; }

        /* ── Stream modal ────────────────────────────────────── */
        .lm-modal { position: fixed; inset: 0; z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1rem; background: rgba(2, 6, 14, 0.62); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
        .lm-modal.open { display: flex; animation: lm-fade 0.2s ease; }
        .lm-modal-card { width: 100%; max-width: 860px; background: #fff; border: 1px solid var(--border); border-radius: 1.1rem; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.4); animation: lm-pop 0.24s cubic-bezier(0.2, 0.9, 0.3, 1.2); }
        .lm-modal-head { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.05rem; border-bottom: 1px solid var(--border); }

        /* ── Loading overlay ─────────────────────────────────── */
        .lm-loading { position: absolute; inset: 0; z-index: 700; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; background: radial-gradient(circle at 50% 40%, #f8fafc, #e2e8f0); transition: opacity 0.5s ease, visibility 0.5s; }
        .lm-loading.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .lm-loading .ring { width: 54px; height: 54px; border-radius: 50%; border: 3px solid rgba(14,165,233,0.16); border-top-color: var(--cyan); animation: lm-spin 0.9s linear infinite; }
        .lm-loading .tx { font-size: 0.78rem; color: var(--muted); font-weight: 600; letter-spacing: 0.04em; }
        .lm-loading .tx b { color: var(--cyan); }

        @keyframes lm-spin { to { transform: rotate(360deg); } }
        @keyframes lm-ping { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); } 70% { box-shadow: 0 0 0 7px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        @keyframes lm-fade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes lm-pop { from { opacity: 0; transform: scale(0.94) translateY(10px); } to { opacity: 1; transform: none; } }

        /* ── Tablet ──────────────────────────────────────────── */
        @media (max-width: 1024px) {
            .lm-topbar { padding: 0.6rem 0.9rem; gap: 0.7rem; }
            .lm-stat { padding: 0.4rem 0.65rem; gap: 0.5rem; }
            .lm-legend { bottom: 14px; left: 14px; padding: 0.65rem 0.8rem; }
            .lm-status { top: 68px; right: 14px; }
        }

        /* ── Mobile ──────────────────────────────────────────── */
        @media (max-width: 640px) {
            .lm-topbar { padding: 0.55rem 0.75rem; gap: 0.55rem; padding-right: 3.4rem; }
            .lm-brand { flex: 1 1 auto; min-width: 0; }
            .lm-brand .ttl { font-size: 0.95rem; }
            .lm-brand .ic { width: 34px; height: 34px; font-size: 0.95rem; }

            /* Stats become a horizontal scroll strip so they never eat vertical space */
            .lm-stats { width: 100%; margin-left: 0; flex-wrap: nowrap; overflow-x: auto; gap: 0.45rem; padding-bottom: 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
            .lm-stats::-webkit-scrollbar { display: none; }
            .lm-stat { flex: 0 0 auto; padding: 0.38rem 0.6rem; gap: 0.45rem; }
            .lm-stat:hover { transform: none; box-shadow: none; }
            .lm-stat .si { width: 22px; height: 22px; font-size: 0.62rem; }
            .lm-stat .v { font-size: 0.9rem; }

            /* Refresh becomes an icon-only button pinned to the top-right of the bar */
            #lm-refresh { position: absolute; top: 0.55rem; right: 0.75rem; font-size: 0; padding: 0.55rem 0.62rem; border-radius: 0.6rem; }
            #lm-refresh i { font-size: 0.9rem; margin: 0; }

            .lm-status { top: auto; bottom: 74px; right: 12px; padding: 0.35rem 0.7rem; font-size: 0.64rem; }
            .lm-legend { bottom: 12px; left: 12px; padding: 0.55rem 0.7rem; font-size: 0.66rem; border-radius: 0.75rem; }
            .lm-legend .hd { margin-bottom: 6px; }
            .lm-legend .row { margin-bottom: 4px; }

            /* Keep the Leaflet zoom control clear of the topbar */
            .leaflet-top.leaflet-left { margin-top: 92px; }

            /* Full-width stream player */
            .lm-modal { padding: 0.5rem; align-items: flex-end; }
            .lm-modal-card { max-width: 100%; border-radius: 0.9rem; }
            .lm-modal-head { padding: 0.7rem 0.85rem; }
            #lm-video { max-height: 62vh; }
        }

        /* ── Small mobile ────────────────────────────────────── */
        @media (max-width: 380px) {
            .lm-brand .kick { font-size: 0.52rem; }
            .lm-brand .ttl { font-size: 0.88rem; }
            .lm-stat .l { font-size: 0.5rem; }
        }
    </style>
</head>
<body>
    <div id="livemap"></div>

    <!-- Loading overlay -->
    <div id="lm-loading" class="lm-loading">
        <div class="ring"></div>
        <div class="tx">Memuat titik <b>CCTV</b> se-Indonesia...</div>
    </div>

    <!-- Top bar -->
    <div class="lm-topbar">
        <div class="lm-brand">
            <div class="ic"><i class="fas fa-satellite-dish"></i></div>
            <div>
                <div class="kick"><span class="live"></span> Monitoring Publik</div>
                <div class="ttl">Live Map CCTV</div>
            </div>
        </div>
        <div class="lm-stats">
            <div class="lm-stat">
                <span class="si" style="background:rgba(100,116,139,0.12);color:#475569"><i class="fas fa-video"></i></span>
                <div><div class="v" id="lm-total">0</div><div class="l">Total</div></div>
            </div>
            <div class="lm-stat">
                <span class="si" style="background:rgba(14,165,233,0.14);color:#0ea5e9"><i class="fas fa-tower-broadcast"></i></span>
                <div><div class="v" id="lm-stream">0</div><div class="l">Live Stream</div></div>
            </div>
            <div class="lm-stat">
                <span class="si" style="background:rgba(147,51,234,0.14);color:#9333ea"><i class="fas fa-camera"></i></span>
                <div><div class="v" id="lm-snapshot">0</div><div class="l">Snapshot</div></div>
            </div>
            <div class="lm-stat">
                <span class="si" style="background:rgba(16,185,129,0.14);color:#10b981"><i class="fas fa-location-dot"></i></span>
                <div><div class="v" id="lm-cities">0</div><div class="l">Kota</div></div>
            </div>
            <button class="lm-btn" id="lm-refresh" onclick="refreshLiveMap()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </div>

    <!-- Status -->
    <span id="lm-status" class="lm-status"><i class="fas fa-spinner fa-spin" style="font-size:10px"></i> Memuat...</span>

    <!-- Legend -->
    <div class="lm-legend">
        <div class="hd">Keterangan</div>
        <div class="row" style="color:#0ea5e9"><span class="sw" style="background:#0ea5e9"></span> <span style="color:var(--text)">Live Stream (HLS)</span></div>
        <div class="row" style="color:#9333ea"><span class="sw" style="background:#9333ea"></span> <span style="color:var(--text)">Snapshot</span></div>
    </div>

    <!-- Stream Player Modal -->
    <div id="lm-modal" class="lm-modal">
        <div class="lm-modal-card">
            <div class="lm-modal-head">
                <div style="display:flex;align-items:center;gap:0.55rem;min-width:0">
                    <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:10px;font-weight:800;background:rgba(14,165,233,0.12);color:#0284c7;border:1px solid rgba(14,165,233,0.28)"><i class="fas fa-circle" style="font-size:6px"></i> LIVE</span>
                    <h3 id="lm-modal-title" style="font-size:14px;font-weight:800;color:#0f172a;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></h3>
                </div>
                <button onclick="lmCloseStream()" style="width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:#f8fafc;color:#64748b;cursor:pointer;font-size:16px;transition:all .2s" onmouseover="this.style.color='#dc2626';this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.color='#64748b';this.style.background='#f8fafc'"><i class="fas fa-xmark"></i></button>
            </div>
            <div style="background:#000">
                <video id="lm-video" controls autoplay muted playsinline style="width:100%;max-height:70vh;display:block;background:#000"></video>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
    <script>
    var lmMap = null;
    var lmMarkerLayer = null;
    var lmCameras = [];
    var lmFitted = false;

    document.addEventListener("DOMContentLoaded", function() {
        initLiveMap();
    });

    function initLiveMap() {
        lmMap = L.map("livemap", { scrollWheelZoom: true, zoomControl: true, preferCanvas: true }).setView([-6.2146, 106.8020], 11);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
            attribution: "© OpenStreetMap, © CARTO", maxZoom: 19
        }).addTo(lmMap);
        lmMarkerLayer = L.layerGroup().addTo(lmMap);
        setTimeout(function() { if (lmMap) lmMap.invalidateSize(); }, 200);
        loadLiveMap();
    }

    async function loadLiveMap() {
        setStatus("load");
        try {
            var res = await fetch("/api/external_cameras");
            if (!res.ok) {
                var errData = await res.json().catch(function() { return {}; });
                throw new Error(errData.message || ("HTTP " + res.status));
            }
            var data = await res.json();
            var rawCams = data.cameras || [];

            lmCameras = rawCams.map(function(c) {
                var props = (c && c.properties) ? c.properties : c;
                var coords = (c && c.geometry && c.geometry.coordinates) ? c.geometry.coordinates : [];
                var hlsUrl = props.hls_url || "";
                var snapshotUrl = props.snapshot_url || "";
                var isStream = !!(hlsUrl && hlsUrl.indexOf(".m3u8") !== -1);
                var lat = (coords.length > 1 ? coords[1] : null);
                var lng = (coords.length > 0 ? coords[0] : null);
                if (lat === null || lat === undefined) lat = props.latitude;
                if (lng === null || lng === undefined) lng = props.longitude;
                return {
                    external_id: props.external_id || props.id || "",
                    name: props.name || props.cctv_name || ("Camera " + (props.external_id || props.id || "")),
                    city: props.city || props.city_name || "",
                    address: props.address || "",
                    lat: lat,
                    lng: lng,
                    snapshot_url: snapshotUrl,
                    hls_url: hlsUrl,
                    stream_url: props.stream_url || hlsUrl || snapshotUrl,
                    type: isStream ? "stream" : "snapshot",
                };
            });

            renderLiveMarkers();
            updateStats();
            setStatus("ok");
        } catch (e) {
            console.error("[loadLiveMap]", e);
            setStatus("err");
        }
    }

    function renderLiveMarkers() {
        if (!lmMap || !lmMarkerLayer) return;
        lmMarkerLayer.clearLayers();

        var bounds = [];
        lmCameras.forEach(function(cam) {
            var lat = normalizeCoord(cam.lat, 90);
            var lng = normalizeCoord(cam.lng, 180);
            if (lat === null || lng === null || (lat === 0 && lng === 0)) return;
            // Keep only cameras within Indonesia's geographic range
            if (lat < -11 || lat > 6 || lng < 95 || lng > 141) return;
            cam.lat = lat;
            cam.lng = lng;

            var isStream = cam.type === "stream";
            var color = isStream ? "#0ea5e9" : "#9333ea";

            // Soft glow halo (behind) for a subtle lit-up feel
            L.circleMarker([lat, lng], {
                radius: 9, stroke: false,
                fillColor: color, fillOpacity: isStream ? 0.18 : 0.12,
                interactive: false,
            }).addTo(lmMarkerLayer);

            var marker = L.circleMarker([lat, lng], {
                radius: 5.5, color: "#ffffff", weight: 1.5,
                fillColor: color, fillOpacity: 0.95,
            });
            marker.cam = cam;
            marker.on("click", function(e) { openCamPopup(e.target); });
            marker.addTo(lmMarkerLayer);
            bounds.push([lat, lng]);
        });

        if (!lmFitted && bounds.length > 0) {
            try {
                if (bounds.length === 1) lmMap.setView(bounds[0], 15);
                else lmMap.fitBounds(bounds, { padding: [60, 60], maxZoom: 15 });
                lmFitted = true;
            } catch (e) {}
        }
    }

    function openCamPopup(marker) {
        var cam = marker.cam;
        if (!cam) return;
        var lat = parseFloat(cam.lat), lng = parseFloat(cam.lng);
        var isStream = cam.type === "stream";
        var color = isStream ? "#0ea5e9" : "#9333ea";
        var typeLabel = isStream ? "Live Stream" : "Snapshot";
        var imgSrc = cam.snapshot_url || "";
        var previewHtml = imgSrc
            ? '<div class="preview"><img src="' + escHtml(imgSrc) + '" alt="" onerror="this.style.display=\'none\'"></div>'
            : '';
        var html =
            '<div class="cam-popup" style="min-width:214px">' +
            '<div class="title">' + escHtml(cam.name) + '</div>' +
            (cam.city ? '<div style="font-size:11px;color:#64748b;margin-top:2px"><i class="fas fa-city" style="font-size:9px;margin-right:4px;opacity:.7"></i>' + escHtml(cam.city) + '</div>' : '') +
            '<div style="margin-top:7px"><span style="background:' + color + '1a;color:' + color + ';padding:2px 9px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid ' + color + '44"><i class="fas fa-circle" style="font-size:6px;margin-right:5px"></i>' + typeLabel + '</span></div>' +
            previewHtml +
            (cam.address ? '<div style="font-size:10px;color:#94a3b8;margin-top:7px;line-height:1.4">' + escHtml(cam.address) + '</div>' : '') +
            '<div style="font-size:10px;color:#94a3b8;font-family:ui-monospace,monospace;margin-top:7px"><i class="fas fa-map-pin"></i> ' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '</div>' +
            (isStream && cam.hls_url ? '<button onclick="lmPlayStream(\'' + encodeURIComponent(cam.hls_url) + '\',\'' + escHtml(cam.name).replace(/'/g, "") + '\')" style="margin-top:10px;width:100%;padding:8px 8px;border-radius:8px;border:none;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;font-size:11px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(14,165,233,0.3)"><i class="fas fa-play" style="margin-right:5px"></i>Putar Stream</button>' : '') +
            '</div>';
        marker.bindPopup(html, { maxWidth: 280 }).openPopup();
    }

    function updateStats() {
        var total = 0, stream = 0, snapshot = 0;
        var cities = {};
        lmCameras.forEach(function(cam) {
            total++;
            if (cam.type === "stream") stream++;
            else snapshot++;
            if (cam.city) cities[cam.city] = true;
        });
        setText("lm-total", total);
        setText("lm-stream", stream);
        setText("lm-snapshot", snapshot);
        setText("lm-cities", Object.keys(cities).length);
    }

    function setStatus(state) {
        var el = document.getElementById("lm-status");
        var loading = document.getElementById("lm-loading");
        if (state === "ok") {
            if (el) { el.className = "lm-status"; el.innerHTML = '<i class="fas fa-circle" style="font-size:6px"></i> Data termuat'; }
            if (loading) loading.classList.add("hide");
        } else if (state === "err") {
            if (el) { el.className = "lm-status err"; el.innerHTML = '<i class="fas fa-triangle-exclamation" style="font-size:10px"></i> Gagal memuat data'; }
            if (loading) loading.classList.add("hide");
        } else {
            if (el) { el.className = "lm-status"; el.innerHTML = '<i class="fas fa-spinner fa-spin" style="font-size:10px"></i> Memuat...'; }
        }
    }

    function refreshLiveMap() {
        var btn = document.getElementById("lm-refresh");
        if (btn) {
            var icon = btn.querySelector("i");
            if (icon) { icon.classList.add("fa-spin"); setTimeout(function() { icon.classList.remove("fa-spin"); }, 800); }
        }
        loadLiveMap();
    }

    // ── Stream Player ────────────────────────────────────────────────────────────
    var lmHls = null;

    function lmEnsureHls(cb) {
        if (typeof Hls !== "undefined") { cb(); return; }
        var js = document.createElement("script");
        js.src = "https://cdn.jsdelivr.net/npm/hls.js@1.5/dist/hls.min.js";
        js.onload = function() { cb(); };
        js.onerror = function() { cb(); };
        document.head.appendChild(js);
    }

    function lmPlayStream(encodedUrl, name) {
        var rawUrl = decodeURIComponent(encodedUrl);
        // Route through our backend proxy so the manifest/segments carry CORS headers.
        var url = "/api/hls_proxy?url=" + encodeURIComponent(rawUrl);
        var modal = document.getElementById("lm-modal");
        var video = document.getElementById("lm-video");
        document.getElementById("lm-modal-title").textContent = name || "Live Stream";
        modal.classList.add("open");

        lmEnsureHls(function() {
            if (typeof Hls !== "undefined" && Hls.isSupported()) {
                if (lmHls) { lmHls.destroy(); lmHls = null; }
                lmHls = new Hls({ lowLatencyMode: true });
                lmHls.loadSource(url);
                lmHls.attachMedia(video);
                lmHls.on(Hls.Events.MANIFEST_PARSED, function() { video.play().catch(function() {}); });
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = url;
                video.play().catch(function() {});
            }
        });
    }

    function lmCloseStream() {
        var modal = document.getElementById("lm-modal");
        var video = document.getElementById("lm-video");
        modal.classList.remove("open");
        if (lmHls) { lmHls.destroy(); lmHls = null; }
        try { video.pause(); video.removeAttribute("src"); video.load(); } catch (e) {}
    }

    document.getElementById("lm-modal").addEventListener("click", function(e) {
        if (e.target === this) lmCloseStream();
    });
    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") lmCloseStream();
    });

    // ── Helpers ──────────────────────────────────────────────────────────────────
    function setText(id, val) {
        var el = document.getElementById(id);
        if (el) el.textContent = (typeof val === "number") ? val.toLocaleString("id-ID") : val;
    }

    function escHtml(str) {
        if (str === null || str === undefined) return "";
        var d = document.createElement("div");
        d.textContent = String(str);
        return d.innerHTML;
    }

    // Some API records lose their decimal point (e.g. -6205554523 => -6.205554523).
    // Divide by 10 until the value fits within the valid coordinate range.
    function normalizeCoord(val, maxAbs) {
        var n = parseFloat(val);
        if (!isFinite(n)) return null;
        var guard = 0;
        while (Math.abs(n) > maxAbs && guard < 12) {
            n = n / 10;
            guard++;
        }
        if (Math.abs(n) > maxAbs) return null;
        return n;
    }
    </script>
</body>
