<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADI - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b1220;
            background-image: radial-gradient(800px circle at 50% 30%, rgba(56, 189, 248, 0.08), transparent 60%),
                              radial-gradient(600px circle at 80% 80%, rgba(99, 102, 241, 0.06), transparent 50%);
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
        }
        .login-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.7);
        }
        .input-field {
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.10);
            color: #e2e8f0;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            width: 100%;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="login-card w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-slate-900/60 border border-white/10 flex items-center justify-center">
                <img src="/static/img/logo.png" alt="Logo" class="h-10 w-auto" onerror="this.innerHTML='<i class=\'fas fa-traffic-light text-sky-400 text-2xl\'></i>'">
            </div>
            <h1 class="text-xl font-bold text-white">PADI</h1>
            <p class="text-sm text-slate-500 mt-1">Platform Adaptive Deteksi Indonesia</p>
        </div>

        <!-- Error -->
        {% if error %}
        <div class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-300 text-sm flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-xs text-slate-400 mb-1.5 font-medium">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" name="username" class="input-field pl-10" placeholder="Masukkan username" required autofocus>
                </div>
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1.5 font-medium">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" name="password" class="input-field pl-10" placeholder="Masukkan password" required>
                </div>
            </div>
            <button type="submit" class="w-full py-3 bg-sky-600 hover:bg-sky-500 text-white rounded-xl font-semibold text-sm transition-all shadow-lg shadow-sky-900/30 mt-2">
                <i class="fas fa-sign-in-alt mr-2"></i>Masuk
            </button>
        </form>

        <!-- Info -->
        <div class="mt-6 pt-5 border-t border-white/5 text-center">
            <p class="text-[11px] text-slate-600">Team Asterion · AI Open Innovation Challenge 2026</p>
        </div>
    </div>
</body>
</html>
