server {

    server_name compe.f-mc.my.id;

    client_max_body_size 50M;

    # ── Proxy untuk CCTV Dishub DKI (HLS Stream) ────────────────────────────
    # Browser tidak bisa fetch langsung ke streetside.mugnimaestra.dev karena CORS.
    # nginx ini jadi proxy yang menambahkan CORS headers.
    location /hlsproxy/ {
        # Hapus prefix /hlsproxy/ sebelum meneruskan request
        rewrite ^/hlsproxy/(.*) /$1 break;
        proxy_pass https://streetside.mugnimaestra.dev/;

        # CORS headers — izinkan akses dari domain ini
        add_header 'Access-Control-Allow-Origin' 'https://compe.f-mc.my.id' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range, Content-Type' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        # Izinkan byte-range requests (diperlukan untuk HLS segment loading)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        proxy_ssl_server_name on;
        proxy_ssl_name streetside.mugnimaestra.dev;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # ── Flask App ──────────────────────────────────────────────────────────
    location / {
        proxy_pass http://10.10.10.4:5002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/compe.f-mc.my.id/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/compe.f-mc.my.id/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = compe.f-mc.my.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name compe.f-mc.my.id;
    return 404; # managed by Certbot
}
